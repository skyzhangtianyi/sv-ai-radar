<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硅谷AI雷达</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --red: #e63946;
  --blue: #1d6fa4;
  --green: #2a9d5c;
  --orange: #f4841f;
  --purple: #6d4c9e;
  --text: #1a1a1a;
  --text2: #555;
  --text3: #999;
  --border: #e8e8e8;
  --bg: #f5f5f5;
  --white: #fff;
  --wechat: #07C160;
}
body { font-family:'Noto Sans SC',-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); font-size:15px; line-height:1.7; }
a { text-decoration:none; color:inherit; }

/* HEADER */
.site-header { background:var(--white); border-bottom:2px solid var(--red); position:sticky; top:0; z-index:100; }
.header-inner { max-width:960px; margin:0 auto; padding:0 20px; height:56px; display:flex; align-items:center; justify-content:space-between; }
.site-logo { display:flex; align-items:center; gap:10px; }
.logo-badge { background:var(--red); color:#fff; font-size:13px; font-weight:700; padding:3px 9px; letter-spacing:1px; display:flex; align-items:center; gap:4px; }
.logo-title { font-size:18px; font-weight:700; letter-spacing:2px; }
.wechat-tag { font-size:11px; color:var(--wechat); background:#e8f8ee; padding:2px 8px; border-radius:2px; font-weight:600; letter-spacing:1px; }
.header-right { text-align:right; font-size:12px; color:var(--text3); line-height:1.6; }

/* NAV */
.site-nav { background:var(--white); border-bottom:1px solid var(--border); }
.nav-inner { max-width:960px; margin:0 auto; padding:0 20px; display:flex; align-items:center; justify-content:space-between; }
.nav-tabs { display:flex; }
.nav-item { padding:12px 18px; font-size:14px; font-weight:500; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.15s; user-select:none; white-space:nowrap; }
.nav-item:hover { color:var(--text); }
.nav-item.active { color:var(--red); border-bottom-color:var(--red); font-weight:700; }
.archive-btn { font-size:12px; color:var(--text3); padding:6px 12px; border:1px solid var(--border); background:#fff; cursor:pointer; border-radius:2px; white-space:nowrap; transition:all 0.15s; }
.archive-btn:hover { border-color:var(--red); color:var(--red); }

/* LAYOUT */
.page-body { max-width:960px; margin:0 auto; padding:24px 20px 60px; display:grid; grid-template-columns:1fr 280px; gap:24px; align-items:start; }
.section { display:none; }
.section.active { display:contents; }
.main-col { grid-column:1; }
.side-col  { grid-column:2; }
.full-col  { grid-column:1/-1; }

/* COL HEADER */
.col-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.col-header-title { font-size:16px; font-weight:700; }
.col-header-count { font-size:12px; color:var(--text3); margin-left:auto; }

/* TAGS */
.tag { font-size:11px; font-weight:700; padding:2px 7px; border-radius:2px; letter-spacing:0.5px; }
.tag-red    { background:#fde8e8; color:var(--red); }
.tag-blue   { background:#e6f0f8; color:var(--blue); }
.tag-green  { background:#e6f4ec; color:var(--green); }
.tag-orange { background:#fef3e6; color:var(--orange); }
.tag-purple { background:#f0eaf8; color:var(--purple); }
.tag-gray   { background:#f0f0f0; color:var(--text2); }
.impact-badge { font-size:11px; padding:2px 7px; border-radius:10px; font-weight:500; }
.impact-high  { background:#fde8e8; color:var(--red); }
.impact-mid   { background:#fef3e6; color:var(--orange); }
.impact-watch { background:#f0f0f0; color:var(--text3); }

/* NEWS */
.news-list { display:flex; flex-direction:column; }
.news-card { background:var(--white); padding:20px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; }
.news-card:hover { background:#fafafa; }
.news-card.featured { border-left:3px solid var(--red); }
.news-meta { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.news-date { font-size:12px; color:var(--text3); margin-left:auto; white-space:nowrap; }
.news-title { font-size:16px; font-weight:700; line-height:1.5; margin-bottom:8px; }
.news-card.featured .news-title { font-size:17px; }
.news-body { font-size:14px; color:var(--text2); line-height:1.8; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.news-card.expanded .news-body { display:block; }
.read-more { display:inline-block; margin-top:8px; font-size:12px; color:var(--blue); cursor:pointer; }
.news-source { margin-top:12px; padding-top:10px; border-top:1px dashed var(--border); font-size:11px; color:var(--text3); }
.news-source a { color:var(--text3); text-decoration:underline; margin-right:4px; }
.news-source a:hover { color:var(--blue); }
.update-notice { background:#fffbe6; border:1px solid #ffe58f; padding:10px 14px; font-size:13px; color:#7a5e00; margin-bottom:16px; }

/* SIDEBAR */
.side-card { background:var(--white); border:1px solid var(--border); margin-bottom:16px; overflow:hidden; }
.side-card-header { padding:12px 16px; border-bottom:1px solid var(--border); font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; }
.side-card-header::before { content:''; display:block; width:3px; height:14px; background:var(--red); border-radius:1px; }
.side-list { padding:4px 0; }
.side-item { padding:10px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; }
.side-item:last-child { border-bottom:none; }
.side-item:hover { background:#fafafa; }
.side-item-title { font-size:13px; font-weight:500; line-height:1.5; margin-bottom:4px; }
.side-item-meta { font-size:11px; color:var(--text3); }

/* PRODUCT */
.product-list { display:flex; flex-direction:column; gap:16px; }
.product-card { background:var(--white); border:1px solid var(--border); overflow:hidden; }
.product-card-inner { padding:20px; }
.product-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; gap:12px; }
.product-name { font-size:18px; font-weight:700; margin-bottom:3px; }
.product-en { font-size:12px; color:var(--text3); letter-spacing:1px; }
.product-status { font-size:11px; padding:3px 8px; border-radius:2px; font-weight:700; white-space:nowrap; }
.status-live  { background:#e6f4ec; color:var(--green); }
.status-beta  { background:#e6f0f8; color:var(--blue); }
.status-dev   { background:#fef3e6; color:var(--orange); }
.product-tagline { font-size:13px; color:var(--text3); margin-bottom:12px; }
.product-body { font-size:14px; color:var(--text2); line-height:1.8; margin-bottom:16px; }
.product-divider { height:1px; background:var(--border); margin-bottom:14px; }
.product-footer { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.product-footer-label { font-size:12px; color:var(--text3); margin-right:4px; }
.point-tag { font-size:12px; background:#f0f0f0; color:var(--text2); padding:3px 9px; border-radius:2px; }
.team-links { margin-top:14px; padding-top:12px; border-top:1px dashed var(--border); display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.team-links-label { font-size:11px; color:var(--text3); margin-right:2px; }
.team-person { display:flex; align-items:center; gap:6px; }
.team-person-name { font-size:12px; color:var(--text2); font-weight:500; }
.social-link { display:inline-flex; align-items:center; gap:3px; font-size:11px; padding:2px 7px; border-radius:2px; text-decoration:none; font-weight:500; transition:opacity 0.15s; }
.social-link:hover { opacity:0.75; }
.social-x  { background:#f0f0f0; color:#1a1a1a; }
.social-li { background:#e8f0f8; color:#0a66c2; }
.team-sep { color:var(--border); font-size:12px; }

/* HARDWARE */
.hw-list { display:flex; flex-direction:column; gap:16px; }
.hw-card { background:var(--white); border:1px solid var(--border); padding:20px; }
.hw-top { display:flex; gap:16px; align-items:flex-start; }
.hw-icon { font-size:32px; flex-shrink:0; width:52px; height:52px; background:var(--bg); display:flex; align-items:center; justify-content:center; border:1px solid var(--border); }
.hw-info { flex:1; }
.hw-name { font-size:16px; font-weight:700; margin-bottom:2px; }
.hw-maker { font-size:12px; color:var(--text3); margin-bottom:8px; }
.hw-desc { font-size:14px; color:var(--text2); line-height:1.8; margin-top:12px; }
.hw-specs { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.hw-spec { font-size:12px; background:#f0f0f0; padding:3px 10px; border-radius:2px; color:var(--text2); }
.hw-spec span { color:var(--blue); font-weight:500; }

/* HUB */
.hub-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; }
.contact-card { background:var(--white); border:1px solid var(--border); padding:18px 14px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:8px; transition:all 0.15s; }
.contact-card:hover { border-color:var(--red); box-shadow:0 2px 12px rgba(230,57,70,0.08); }
.contact-avatar { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:#fff; }
.contact-name { font-size:13px; font-weight:700; line-height:1.3; }
.contact-title { font-size:11px; color:var(--text3); }
.contact-company { font-size:11px; font-weight:600; color:var(--text2); background:#f5f5f5; padding:2px 8px; border-radius:2px; }
.contact-links { display:flex; gap:6px; }

/* REQUEST FORM */
.request-section { background:var(--white); border:1px solid var(--border); padding:24px; margin-top:24px; }
.request-title { font-size:15px; font-weight:700; margin-bottom:4px; }
.request-sub { font-size:13px; color:var(--text3); margin-bottom:18px; }
.form-row { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
.form-label { font-size:12px; font-weight:600; color:var(--text2); }
.form-input, .form-textarea { border:1px solid var(--border); border-radius:2px; padding:8px 11px; font-size:13px; font-family:inherit; color:var(--text); outline:none; transition:border-color 0.15s; }
.form-input:focus, .form-textarea:focus { border-color:var(--red); }
.form-textarea { resize:vertical; min-height:72px; }
.form-submit { background:var(--red); color:#fff; border:none; padding:9px 22px; font-size:13px; font-weight:700; cursor:pointer; border-radius:2px; font-family:inherit; }
.form-submit:hover { opacity:0.85; }
.form-success { display:none; background:#e8f8ee; border:1px solid #b7dfc5; padding:10px 14px; font-size:13px; color:var(--green); margin-top:10px; }
.request-log { margin-top:18px; border-top:1px solid var(--border); padding-top:14px; }
.request-log-title { font-size:11px; color:var(--text3); font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
.request-item { font-size:13px; padding:8px 0; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:baseline; }
.request-item:last-child { border-bottom:none; }
.ri-company { font-weight:600; }
.ri-name { color:var(--text2); }
.ri-meta { color:var(--text3); font-size:11px; margin-left:auto; white-space:nowrap; }

/* ARCHIVE MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--white); width:480px; max-width:92vw; max-height:80vh; display:flex; flex-direction:column; }
.modal-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:15px; font-weight:700; }
.modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text3); line-height:1; padding:0 4px; }
.modal-close:hover { color:var(--text); }
.modal-body { overflow-y:auto; padding:16px 20px; flex:1; }
.archive-item { padding:12px 0; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.archive-item:last-child { border-bottom:none; }
.archive-item-info { flex:1; }
.archive-item-title { font-size:14px; font-weight:600; }
.archive-item-meta { font-size:12px; color:var(--text3); margin-top:2px; }
.archive-item-btn { font-size:12px; padding:4px 12px; border:1px solid var(--border); background:#fff; cursor:pointer; border-radius:2px; font-family:inherit; color:var(--text2); }
.archive-item-btn:hover { border-color:var(--red); color:var(--red); }
.archive-empty { font-size:13px; color:var(--text3); padding:20px 0; text-align:center; }

/* FOOTER */
.site-footer { background:var(--white); border-top:1px solid var(--border); padding:20px; text-align:center; font-size:12px; color:var(--text3); line-height:2; }

@media(max-width:720px) {
  .page-body { grid-template-columns:1fr; padding:16px 12px 40px; }
  .side-col { grid-column:1; }
  .nav-item { padding:12px 12px; font-size:13px; }
}
</style>
</head>

// 读取数据：优先用后台保存的，没有就用默认
function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : FALLBACK;
  } catch(e) { return FALLBACK; }
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getIssue(n) {
  return appData.issues[n] || { news:[], products:[], hardware:[] };
}

function renderPage() {
  const pb = document.getElementById('page-body');
  const d = getIssue(viewingIssue);
  const issue = viewingIssue;
  const date = appData.issueDate || '2026-03-24';

  // Update header meta
  document.getElementById('header-meta').innerHTML =
    `每周更新 · 第${issue}期 · ${date.replace(/-/g,'.')}<br>
    <span style="font-size:11px;color:#bbb;">有问题请企业微信联系市场部 <strong style="color:#999;">skytzhang</strong></span>`;

  pb.innerHTML = '';

  if (currentTab === 'news') pb.innerHTML = renderNews(d);
  else if (currentTab === 'products') pb.innerHTML = renderProducts(d);
  else if (currentTab === 'hardware') pb.innerHTML = renderHardware(d);
  else if (currentTab === 'hub') pb.innerHTML = renderHub();

  // Re-attach expand listeners
  pb.querySelectorAll('.news-card').forEach(card => {
    card.addEventListener('click', () => {
      const body = card.querySelector('.news-body');
      const btn = card.querySelector('.read-more');
      if (!body) return;
      card.classList.toggle('expanded');
      if (btn) btn.textContent = card.classList.contains('expanded') ? '收起 ↑' : '展开全文 ↓';
    });
  });

  // Request form listener
  const submitBtn = pb.querySelector('#req-submit');
  if (submitBtn) submitBtn.addEventListener('click', submitRequest);
}

function renderHub() {
  const contacts = appData.hub || [];
  return `
  <div class="full-col">
    <div class="col-header">
      <span class="col-header-title">中美 AI 行业联系人</span>
      <span class="col-header-count">定期更新 · 如需建联请在下方填写</span>
    </div>
    <div class="hub-grid">
      ${contacts.map(c => {
        const initials = c.name.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);
        return `
        <div class="contact-card">
          <div class="contact-avatar" style="background:${esc(c.color||'#e63946')}">${initials}</div>
          <div class="contact-name">${esc(c.name)}</div>
          <div class="contact-title">${esc(c.title||'')}</div>
          <div class="contact-company">${esc(c.company||'')}</div>
          <div class="contact-links">
            ${c.twitter?'<a class="social-link social-x" href="'+esc(c.twitter)+'" target="_blank">𝕏</a>':''}
            ${c.linkedin?'<a class="social-link social-li" href="'+esc(c.linkedin)+'" target="_blank">in</a>':''}
          </div>
        </div>`;
      }).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px;align-items:start;">
      <div class="request-section">
        <div class="request-title">📬 申请建联</div>
        <div class="request-sub">填写你想联系的公司和人名，我们帮你牵线搭桥。</div>
        <div class="form-row"><label class="form-label">公司名称 *</label><input class="form-input" id="req-company" placeholder="例：OpenAI、Mistral…"/></div>
        <div class="form-row"><label class="form-label">联系人姓名</label><input class="form-input" id="req-name" placeholder="不知道可留空"/></div>
        <div class="form-row"><label class="form-label">你的部门 / 姓名 *</label><input class="form-input" id="req-sender" placeholder="例：市场部 张三"/></div>
        <div class="form-row"><label class="form-label">建联目的</label><textarea class="form-textarea" id="req-reason" placeholder="简单说明希望合作的方向…"></textarea></div>
        <button class="form-submit" id="req-submit">提交申请 →</button>
        <div class="form-success" id="req-success">✅ 提交成功！市场部同学将在 3 个工作日内与你确认进展。</div>
      </div>
      <div class="request-section">
        <div class="request-title">📋 建联记录</div>
        <div class="request-sub">同事已提交的建联申请，市场部跟进中。</div>
        <div class="request-log">
          <div class="request-log-title">本期记录</div>
          <div id="request-log"><div style="font-size:13px;color:var(--text3);padding:12px 0;">暂无记录，提交后显示在这里。</div></div>
        </div>
      </div>
    </div>
  </div>`;
}

// ─────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────
function switchTab(id, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  currentTab = id;
  renderPage();
}

function submitRequest() {
  const company = document.getElementById('req-company').value.trim();
  const name    = document.getElementById('req-name').value.trim();
  const sender  = document.getElementById('req-sender').value.trim();
  if (!company || !sender) { alert('请填写公司名称和你的部门/姓名'); return; }

  const log = document.getElementById('request-log');
  const empty = log.querySelector('[style*="color:var(--text3)"]');
  if (empty) empty.remove();

  const now = new Date();
  const item = document.createElement('div');
  item.className = 'request-item';
  item.innerHTML = `<span class="ri-company">${company}</span>${name?'<span class="ri-name">'+name+'</span>':''}<span class="ri-meta">${sender} · ${now.getMonth()+1}/${now.getDate()}</span>`;
  log.appendChild(item);

  ['req-company','req-name','req-sender','req-reason'].forEach(id => document.getElementById(id).value = '');
  const s = document.getElementById('req-success');
  s.style.display = 'block';
  setTimeout(() => s.style.display = 'none', 4000);
}

// ─────────────────────────────────────────
// ARCHIVE
// ─────────────────────────────────────────
function openArchive() {
  const list = document.getElementById('archive-list');
  const issues = Object.keys(appData.issues).map(Number).sort((a,b) => b-a);

  if (!issues.length) {
    list.innerHTML = '<div class="archive-empty">暂无历史期数</div>';
  } else {
    list.innerHTML = issues.map(n => {
      const d = appData.issues[n];
      const isCurrent = n === viewingIssue;
      return `
      <div class="archive-item">
        <div class="archive-item-info">
          <div class="archive-item-title">第 ${n} 期 ${isCurrent ? '&nbsp;<span style=\"font-size:11px;color:var(--red);\">当前</span>' : ''}</div>
          <div class="archive-item-meta">${(d.news||[]).length} 条新闻 · ${(d.products||[]).length} 个产品 · ${(d.hardware||[]).length} 个硬件</div>
        </div>
        <button class="archive-item-btn" onclick="viewIssue(${n})">查看</button>
      </div>`;
    }).join('');
  }

  document.getElementById('archive-modal').classList.add('show');
}

function viewIssue(n) {
  viewingIssue = n;
  closeArchive();
  renderPage();
}

function closeArchive() { document.getElementById('archive-modal').classList.remove('show'); }
function closeArchiveOnBg(e) { if (e.target === e.currentTarget) closeArchive(); }

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
viewingIssue = appData.currentIssue;
renderPage();

// 监听后台数据变化（同一浏览器跨标签页实时同步）
window.addEventListener('storage', e => {
  if (e.key === STORAGE_KEY) {
    appData = loadData();
    viewingIssue = appData.currentIssue;
    renderPage();
  }
});
</script>
